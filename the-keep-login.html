<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Keep | Entrar</title>
  <link rel="stylesheet" href="the-keep-login.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <img src="thelogo.PNG" alt="The Keep Logo" class="brand-logo">
    </div>
    <nav class="nav-links">
      <a href="the-keep-profile.html">Perfil</a>
      <a href="#menu-principal">Menu Principal</a>
      <a href="the-keep-login.html">Login/Cadastro</a>
    </nav>
    <div class="search-bar">
      <input type="text" placeholder="Pesquisar jogos, reviews..." />
    </div>
  </header>

  <main class="login-main">
    <div class="auth-card">

      <!-- Abas de alternância -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Entrar</button>
        <button class="tab-btn" id="tab-cadastro" onclick="showTab('cadastro')">Criar Conta</button>
      </div>

      <!-- Formulário de Login -->
      <div class="auth-form" id="form-login">
        <h2 class="form-title">Bem-vindo de volta</h2>
        <p class="form-subtitle">Entre para continuar no The Keep</p>

        <div id="login-msg" class="msg" style="display:none;"></div>

        <div class="field-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>

        <div class="field-group">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" />
        </div>

        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>

        <p class="switch-hint">
          Não tem conta? <a href="#" onclick="showTab('cadastro'); return false;">Crie uma agora</a>
        </p>
      </div>

      <!-- Formulário de Cadastro -->
      <div class="auth-form" id="form-cadastro" style="display:none;">
        <h2 class="form-title">Crie sua conta</h2>
        <p class="form-subtitle">Registre-se para guardar seus jogos e reviews</p>

        <div id="cadastro-msg" class="msg" style="display:none;"></div>

        <div class="field-group">
          <label for="cad-nome">Nome</label>
          <input type="text" id="cad-nome" placeholder="Seu nome" />
        </div>

        <div class="field-group">
          <label for="cad-email">E-mail</label>
          <input type="email" id="cad-email" placeholder="seu@email.com" />
        </div>

        <div class="field-group">
          <label for="cad-senha">Senha</label>
          <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" />
        </div>

        <div class="field-group">
          <label for="cad-confirmar">Confirmar Senha</label>
          <input type="password" id="cad-confirmar" placeholder="Repita a senha" />
        </div>

        <button class="btn-primary" onclick="fazerCadastro()">Criar Conta</button>

        <p class="switch-hint">
          Já tem conta? <a href="#" onclick="showTab('login'); return false;">Entre aqui</a>
        </p>
      </div>

    </div>
  </main>

  <script>
    // Alterna entre Login e Cadastro
    function showTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('form-login').style.display   = isLogin ? 'flex' : 'none';
      document.getElementById('form-cadastro').style.display = isLogin ? 'none' : 'flex';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-cadastro').classList.toggle('active', !isLogin);
      limparMensagens();
    }

    function limparMensagens() {
      ['login-msg', 'cadastro-msg'].forEach(id => {
        const el = document.getElementById(id);
        el.style.display = 'none';
        el.className = 'msg';
        el.textContent = '';
      });
    }

    function mostrarMsg(id, texto, tipo) {
      const el = document.getElementById(id);
      el.textContent = texto;
      el.className = 'msg ' + tipo;
      el.style.display = 'block';
    }

    // Validação e lógica de Login (front-end apenas)
    function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;

      if (!email || !senha) {
        mostrarMsg('login-msg', 'Preencha todos os campos.', 'erro');
        return;
      }
      if (!validarEmail(email)) {
        mostrarMsg('login-msg', 'E-mail inválido.', 'erro');
        return;
      }

      // Aqui você conectará ao backend futuramente
      // Exemplo: fetch('/api/login', { method: 'POST', body: JSON.stringify({email, senha}) })
      mostrarMsg('login-msg', 'Login realizado com sucesso! Redirecionando...', 'sucesso');
      setTimeout(() => { window.location.href = 'the-keep-profile.html'; }, 1500);
    }

    // Validação e lógica de Cadastro (front-end apenas)
    function fazerCadastro() {
      const nome      = document.getElementById('cad-nome').value.trim();
      const email     = document.getElementById('cad-email').value.trim();
      const senha     = document.getElementById('cad-senha').value;
      const confirmar = document.getElementById('cad-confirmar').value;

      if (!nome || !email || !senha || !confirmar) {
        mostrarMsg('cadastro-msg', 'Preencha todos os campos.', 'erro');
        return;
      }
      if (!validarEmail(email)) {
        mostrarMsg('cadastro-msg', 'E-mail inválido.', 'erro');
        return;
      }
      if (senha.length < 6) {
        mostrarMsg('cadastro-msg', 'A senha precisa ter pelo menos 6 caracteres.', 'erro');
        return;
      }
      if (senha !== confirmar) {
        mostrarMsg('cadastro-msg', 'As senhas não coincidem.', 'erro');
        return;
      }

      // Aqui você conectará ao backend futuramente
      // Exemplo: fetch('/api/cadastro', { method: 'POST', body: JSON.stringify({nome, email, senha}) })
      mostrarMsg('cadastro-msg', 'Conta criada com sucesso! Redirecionando...', 'sucesso');
      setTimeout(() => { window.location.href = 'the-keep-profile.html'; }, 1500);
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // Permite envio com Enter
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const loginVisible = document.getElementById('form-login').style.display !== 'none';
        if (loginVisible) fazerLogin();
        else fazerCadastro();
      }
    });
  </script>

</body>
</html>
