{% extends "base.html" %}
{% block title %}Cadastro — The Keep
<script>
document.getElementById("senha")?.addEventListener("input", function(){
 const v=this.value;
 const ok=v.length>=6 && (v.match(/[A-Z]/g)||[]).length>=1 && (v.match(/[0-9]/g)||[]).length>=2 && /[^A-Za-z0-9]/.test(v);
 const m=document.getElementById("senha-msg");
 m.textContent=ok?"Senha forte":"Senha fraca";
});
</script>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Criar Conta</h2>
    {% if erro %}<p class="msg-erro">{{ erro }}</p>{% endif %}
    <form method="post" action="/cadastro" class="auth-form">
      <label>Username</label>
      <input type="text" name="username" required placeholder="mínimo 3 caracteres"
             minlength="3" pattern=".{3,}" title="Mínimo de 3 caracteres" />
      <label>Email</label>
      <input type="email" name="email" required placeholder="usuario@dominio.com" />
      <label>Senha</label>
      <input type="password" name="senha" id="senha" required
placeholder="6+ caracteres, 1 maiúscula, 2 números e 1 especial" />
<small id="senha-msg"></small>
<label>Confirmar Senha</label>
<input type="password" name="confirmar_senha" required placeholder="Repita a senha" />
      <button type="submit" class="btn-primary w-full">Criar Conta</button>
    </form>
    <p class="auth-alt">Já tem conta? <a href="/login">Entrar</a></p>
  </div>
</div>

<script>
document.getElementById("senha")?.addEventListener("input", function(){
 const v=this.value;
 const ok=v.length>=6 && (v.match(/[A-Z]/g)||[]).length>=1 && (v.match(/[0-9]/g)||[]).length>=2 && /[^A-Za-z0-9]/.test(v);
 const m=document.getElementById("senha-msg");
 m.textContent=ok?"Senha forte":"Senha fraca";
});
</script>
{% endblock %}
