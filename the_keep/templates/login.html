{% extends "base.html" %}
{% block title %}Entrar — The Keep{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Entrar no Keep</h2>
    {% if erro %}<p class="msg-erro">{{ erro }}</p>{% endif %}
    {% if request.query_params.get('cadastro') == 'ok' %}
      <p class="msg-ok">Conta criada! Faça login.</p>
    {% endif %}
    <form method="post" action="/login" class="auth-form">
      <label>Email</label>
      <input type="email" name="email" required placeholder="seu@email.com" />
      <label>Senha</label>
      <input type="password" name="senha" required placeholder="••••••••" />
      <button type="submit" class="btn-primary w-full">Entrar</button>
    </form>
    <p class="auth-alt">Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
  </div>
</div>
{% endblock %}
