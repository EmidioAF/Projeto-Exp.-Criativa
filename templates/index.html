{% extends "base.html" %}
{% block title %}The Keep — Sua Biblioteca de Jogos{% endblock %}
{% block content %}
<section class="hero">
  <div class="hero-text">
    <h1 class="hero-title">Guarde suas<br><span class="accent">histórias</span>.</h1>
    <p class="hero-sub">Descubra, avalie e colecionejogos. The Keep é sua biblioteca pessoal de aventuras.</p>
    <div class="hero-cta">
      <a href="/biblioteca" class="btn-primary">Ver Biblioteca</a>
      {% if not usuario %}
      <a href="/cadastro" class="btn-outline">Criar Conta</a>
      {% endif %}
    </div>
  </div>
  <div class="hero-deco">⚔</div>
</section>
{% endblock %}
