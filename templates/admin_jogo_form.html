{% extends "base.html" %}
{% block title %}{% if jogo %}Editar{% else %}Novo{% endif %} Jogo — The Keep{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:600px">
    <h2 class="auth-title">{% if jogo %}Editar: {{ jogo.nome }}{% else %}Novo Jogo{% endif %}</h2>
    <form method="post" action="{% if jogo %}/admin/jogo/{{ jogo.id }}/editar{% else %}/admin/jogo/novo{% endif %}" class="auth-form">
      <label>Nome *</label>
      <input type="text" name="nome" value="{{ jogo.nome if jogo else '' }}" required />
      <label>Desenvolvedora</label>
      <input type="text" name="desenvolvedora" value="{{ jogo.desenvolvedora if jogo else '' }}" />
      <label>Data de Lançamento</label>
      <input type="date" name="data_lancamento" value="{{ jogo.data_lancamento if jogo else '' }}" />
      <label>Gênero</label>
      <input type="text" name="genero" value="{{ jogo.genero if jogo else '' }}" placeholder="RPG, Action, etc." />
      <label>URL da Capa</label>
      <input type="url" name="capa_url" value="{{ jogo.capa_url if jogo else '' }}" placeholder="https://..." />
      <label>Descrição</label>
      <textarea name="descricao" rows="3">{{ jogo.descricao if jogo else '' }}</textarea>
      <label>Lore</label>
      <textarea name="lore" rows="4">{{ jogo.lore if jogo else '' }}</textarea>
      <div style="display:flex;gap:1rem;margin-top:1rem">
        <button type="submit" class="btn-primary">Salvar</button>
        <a href="/admin" class="btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
